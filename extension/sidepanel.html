<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子書下載工具</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <h1>📚 電子書下載工具</h1>
  </header>

  <!-- 偵測狀態 -->
  <section class="card">
    <div class="detect-row">
      <span class="count" id="img-count">0</span>
      <span>頁已偵測</span>
    </div>
    <div class="dom-range" id="dom-range" hidden></div>
    <div class="api-badge" id="api-badge" hidden>✓ API 已自動取得書名與總頁數</div>
    <p class="hint" id="detect-hint">請開啟博客來電子書閱讀器並翻幾頁…</p>
    <div id="template-wrap" hidden>
      <div class="template-box" id="template-display"></div>
    </div>
  </section>

  <!-- 模式切換 -->
  <div class="tabs">
    <button class="tab active" data-tab="whole">整本下載</button>
    <button class="tab" data-tab="chapter">分章節下載</button>
  </div>

  <!-- 整本下載 -->
  <section class="card" id="tab-whole">
    <h2>整本下載</h2>
    <p class="hint">一次下載全書為單一 PDF。</p>
    <label>書名（檔名）
      <input type="text" id="whole-title" placeholder="書名">
    </label>
    <label>結束頁（選填，留空自動下載至結尾）
      <input type="number" id="whole-end" min="1" placeholder="留空 = 自動偵測">
    </label>
    <p class="hint" id="whole-end-hint" hidden></p>
    <button class="primary" id="whole-dl-btn" style="margin-top:10px">下載整本 PDF</button>
  </section>

  <!-- 分章節下載 -->
  <section class="card" id="tab-chapter" hidden>
    <h2>章節設定</h2>
    <div class="toc-badge" id="toc-badge" hidden>✓ 目錄已自動載入</div>
    <p class="hint">填入每個章節的名稱與頁碼範圍，每章各下載一個 PDF。</p>
    <table id="chapters-table">
      <thead>
        <tr><th>章節名稱</th><th>起始頁</th><th>結束頁</th><th></th></tr>
      </thead>
      <tbody id="chapters-body"></tbody>
    </table>
    <button class="secondary" id="add-btn">+ 新增章節</button>
    <button class="primary" id="chapter-dl-btn" style="margin-top:10px">下載各章節 PDF</button>
  </section>

  <!-- 進度與日誌 -->
  <section class="card" id="progress-card" hidden>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="log" id="log"></div>
    <ul class="pdf-list" id="pdf-list"></ul>
  </section>

  <!-- 臨時 debug 區塊，確認問題後刪除 -->
  <section class="card" style="margin-top:8px">
    <button onclick="
      chrome.storage.session.get(['bookChapters','downloadLink','downloadToken','bookTitle','estimatedTotal'], d => {
        document.getElementById('dbg').textContent = JSON.stringify(d, null, 2);
      })
    " style="font-size:11px;padding:4px 8px;background:#2a2f3a;color:#9aa3b2;border:1px solid #3a4050;border-radius:5px;cursor:pointer">🔍 Debug: 顯示 Session Storage</button>
    <pre id="dbg" style="font-size:10px;color:#ffcf6b;white-space:pre-wrap;word-break:break-all;margin-top:6px;max-height:200px;overflow-y:auto"></pre>
  </section>

  <script src="lib/pdf-lib.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
